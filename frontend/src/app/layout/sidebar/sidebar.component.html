
<aside
  class="sidebar"
  [class.sidebar--collapsed]="layout.sidebarCollapsed()"
>

  <div class="sidebar__logo">
    @if (layout.sidebarCollapsed()) {
      <button
        type="button"
        class="sidebar__expand-btn"
        (click)="layout.toggleSidebar()"
        title="Развернуть"
      >
        <ct-image-logo class="sidebar__logo-icon" borderRadius="var(--radius-8)" [size]="42" imageColor="var(--color-bg-surface)" backgroundColor="var(--color-brand-blue)"></ct-image-logo>
        <ct-icon name="sidebar" class="sidebar__hover-icon"></ct-icon>
      </button>
    } @else {
      <div class="sidebar__brand">
        <ct-image-logo borderRadius="var(--radius-8)" [size]="42" imageColor="var(--color-bg-surface)" backgroundColor="var(--color-brand-blue)"></ct-image-logo>
        <span class="brand-text">Car<span>Tech</span></span>
      </div>

      <ct-button
        type="button"
        variant="ghost"
        size="md"
        (click)="layout.toggleSidebar()"
      >
        <ct-icon name="sidebar"></ct-icon>
      </ct-button>
    }
  </div>

  <nav class="sidebar__navigation">
    @for (item of navigation; track item.route) {
      <app-nav-item [item]="item"></app-nav-item>
    }
  </nav>

  <footer class="sidebar__footer">
    <span>FOOTER</span>
  </footer>

</aside>
