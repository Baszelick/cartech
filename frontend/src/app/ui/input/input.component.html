<!-- shared/components/input/input.component.html -->
<div class="ct-input-wrapper" [class.ct-input-wrapper--disabled]="disabled()">

  @if (icon()) {
    <span class="ct-input-wrapper__icon">
      🔍
    </span>
  }

  <input
    [type]="type()"
    [placeholder]="placeholder()"
    [disabled]="disabled()"
    [value]="value()"
    (input)="handleInput($event)"
    (blur)="handleBlur()"
    class="ct-input"
    [class.ct-input--has-icon]="icon()"
  />

</div>
