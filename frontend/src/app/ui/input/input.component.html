<div class="ct-input-wrapper" [class.ct-input-wrapper--disabled]="disabled()">

  <div class="ct-input-wrapper__prefix">
    <ng-content select="[ctInputPrefix]"></ng-content>
  </div>

  <input
    [type]="type()"
    [placeholder]="placeholder()"
    [disabled]="disabled()"
    [value]="value()"
    (input)="handleInput($event)"
    class="ct-input"
  />

  <div class="ct-input-wrapper__suffix">
    <ng-content select="[ctInputSuffix]"></ng-content>
  </div>

</div>
